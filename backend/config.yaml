# Face Analyzer Configuration

# Model paths
MODEL_DIR: "models/weights"
FACE_DETECTION_MODEL: "models/weights/face_detection.onnx"
FACE_LANDMARK_MODEL: "models/weights/face_landmarks.onnx"
FACE_SHAPE_MODEL: "models/weights/face_shape_classifier.onnx"
BEARD_STYLE_MODEL: "models/weights/beard_recommender.onnx"
HAIR_STYLE_MODEL: "models/weights/hair_recommender.onnx"
GLASSES_STYLE_MODEL: "models/weights/glasses_recommender.onnx"

# Face shape classes
FACE_SHAPES:
  - "oval"
  - "round"
  - "square"
  - "heart"
  - "diamond"
  - "oblong"
  - "triangle"

# Beard styles by face shape
BEARD_STYLES:
  oval:
    - "full beard"
    - "goatee"
    - "stubble"
    - "van dyke"
    - "anchor beard"
  round:
    - "extended goatee"
    - "chin strap"
    - "soul patch"
    - "van dyke"
    - "balbo"
  square:
    - "circle beard"
    - "goatee"
    - "chin curtain"
    - "mutton chops"
    - "stubble"
  heart:
    - "chin strap"
    - "goatee"
    - "soul patch"
    - "stubble"
    - "van dyke"
  diamond:
    - "full beard"
    - "goatee"
    - "chin strap"
    - "stubble"
    - "anchor beard"
  oblong:
    - "full beard"
    - "mutton chops"
    - "chin curtain"
    - "stubble"
    - "garibaldi"
  triangle:
    - "full beard"
    - "goatee"
    - "chin strap"
    - "stubble"
    - "van dyke"

# Glasses frame styles by face shape
# Heuristic: pick frame shapes that contrast the face shape (angular frames
# soften round faces, rounded frames soften angular faces, etc.)
GLASSES_STYLES:
  oval:
    - "rectangular frames"
    - "square frames"
    - "aviator"
    - "browline"
    - "wayfarer"
  round:
    - "square frames"
    - "rectangular frames"
    - "geometric frames"
    - "browline"
    - "wayfarer"
  square:
    - "round frames"
    - "oval frames"
    - "rimless"
    - "aviator"
    - "cat-eye"
  heart:
    - "cat-eye"
    - "round frames"
    - "rimless"
    - "oval frames"
    - "aviator"
  diamond:
    - "oval frames"
    - "cat-eye"
    - "rimless"
    - "browline"
    - "round frames"
  oblong:
    - "oversized frames"
    - "round frames"
    - "square frames"
    - "wayfarer"
    - "browline"
  triangle:
    - "cat-eye"
    - "browline"
    - "aviator"
    - "oval frames"
    - "rimless"

